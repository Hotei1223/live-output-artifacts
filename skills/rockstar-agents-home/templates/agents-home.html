<!-- Rockstar Agents home — lists every IR agent (orchestrator) the user can
     access; expand an agent to see its skills + tools; each skill has a
     "Start chat" button that opens a NEW Cowork chat for that skill.
     LIVE: re-fetches on reopen.

     Claude — before creating the artifact you MUST do ONE substitution:
     replace the TWO occurrences of the token __ROCKSTAR_AGENTS_TOOL__ (the
     `const TOOL` line below AND the `mcp_tools` array you pass to
     create_artifact) with the EXACT fully-qualified name of the rockstar_agents
     tool as it appears in THIS session's available tools — it looks like
     `mcp__<serverId>__rockstar_agents` where <serverId> is an opaque UUID.
     Do NOT use `mcp__ir-mcp__rockstar_agents` (the friendly connector name) —
     it does NOT resolve inside the Cowork artifact sandbox and the load fails.
     Otherwise copy this HTML as-is; do NOT paste any instructions into the page. -->
<style>
  /* Dark "command center" theme — the artifact paints its own dark surface so it
     looks intentional regardless of the Cowork background. */
  *{box-sizing:border-box}
  html,body{ margin:0; background:#080b13; }
  :root{
    --bd:rgba(150,130,255,.14); --bd-h:rgba(165,135,255,.6);
    --txt:#eef0f8; --muted:#9aa0b8; --faint:#6b7088;
    --acc1:#7c5cff; --acc2:#d24bef;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace;
  }
  #rah-status{ min-height:100vh; color:var(--muted); padding:40px 26px;
    font:14px var(--mono); background:#080b13; }
  #rah{ font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,system-ui,sans-serif;
    color:var(--txt); min-height:100vh; padding:30px 26px 56px;
    background:
      radial-gradient(1100px 560px at 12% -12%, rgba(124,92,255,.20), transparent 58%),
      radial-gradient(900px 460px at 102% -4%, rgba(210,75,239,.14), transparent 55%),
      linear-gradient(rgba(255,255,255,.022) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.022) 1px, transparent 1px),
      #080b13;
    background-size:auto, auto, 42px 42px, 42px 42px, auto; }
  /* header */
  .rah-head{ margin:2px 2px 22px; max-width:1100px; }
  .rah-head h1{ margin:0; font-size:30px; font-weight:760; letter-spacing:-.02em; color:#fff;
    background:linear-gradient(90deg,#ffffff,#c9c4ff); -webkit-background-clip:text;
    background-clip:text; -webkit-text-fill-color:transparent; }
  .rah-head .sub{ margin:9px 0 0; color:var(--muted); font-size:14.5px; max-width:640px; }
  .rah-count{ display:inline-flex; align-items:center; gap:8px; margin-top:16px;
    padding:7px 14px; border-radius:999px; font:600 11.5px/1 var(--mono);
    letter-spacing:.06em; text-transform:uppercase; color:#cdbcff;
    background:rgba(124,92,255,.1); border:1px solid rgba(124,92,255,.3);
    box-shadow:0 0 24px rgba(124,92,255,.18) inset; }
  .rah-count::before{ content:""; width:7px; height:7px; border-radius:50%; background:#36e0a0;
    box-shadow:0 0 10px #36e0a0; animation:rahPulse 1.8s ease-in-out infinite; }
  @keyframes rahPulse{ 0%,100%{opacity:1} 50%{opacity:.3} }
  /* search */
  .rah-search{ position:relative; margin:20px 2px 26px; max-width:720px; }
  .rah-search input{ width:100%; padding:14px 14px 14px 44px; border-radius:13px;
    background:rgba(255,255,255,.04); border:1px solid var(--bd); color:var(--txt);
    font:14.5px var(--mono); outline:none;
    transition:border-color .15s, box-shadow .15s, background .15s; }
  .rah-search input::placeholder{ color:var(--faint); }
  .rah-search input:focus{ border-color:var(--bd-h); background:rgba(255,255,255,.06);
    box-shadow:0 0 0 4px rgba(124,92,255,.15), 0 0 30px rgba(124,92,255,.12); }
  .rah-search svg{ position:absolute; left:15px; top:50%; transform:translateY(-50%);
    width:17px; height:17px; color:#8b7dff; }
  /* agent block */
  .rah-agent{ margin-bottom:30px; max-width:1100px; }
  .rah-agent-head{ display:flex; align-items:center; gap:11px; flex-wrap:wrap; margin:0 2px 6px; }
  .rah-agent-head h2{ margin:0; font-size:16px; font-weight:730; letter-spacing:.02em;
    text-transform:uppercase; color:#fff; }
  .rah-agent-head .tag{ font:600 11px var(--mono); color:#8b7dff; letter-spacing:.08em;
    text-transform:uppercase; padding:3px 9px; border:1px solid var(--bd); border-radius:7px; }
  .rah-agent-desc{ margin:0 2px 18px; color:var(--muted); font-size:13.5px; max-width:820px; }
  /* labels */
  .rah-label{ margin:22px 2px 13px; font:700 10.5px var(--mono); letter-spacing:.22em;
    text-transform:uppercase; color:var(--faint); display:flex; align-items:center; gap:10px; max-width:1100px; }
  .rah-label::after{ content:""; flex:1; height:1px; background:linear-gradient(90deg,var(--bd),transparent); }
  /* skills grid */
  .rah-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px; max-width:1100px; }
  .rah-skill{ position:relative; display:flex; flex-direction:column; overflow:hidden;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.022));
    border:1px solid var(--bd); border-radius:15px; padding:17px 17px 16px;
    transition:border-color .18s ease, box-shadow .18s ease, transform .18s ease; }
  .rah-skill::before{ content:""; position:absolute; inset:0 0 auto 0; height:1px; opacity:0;
    background:linear-gradient(90deg,transparent,rgba(165,135,255,.55),transparent);
    transition:opacity .18s ease; }
  .rah-skill:hover{ border-color:var(--bd-h); transform:translateY(-3px);
    box-shadow:0 12px 36px rgba(124,92,255,.22), 0 0 0 1px rgba(165,135,255,.18); }
  .rah-skill:hover::before{ opacity:1; }
  .rah-skill .nm{ font-size:15px; font-weight:700; color:#fff; margin-bottom:7px; }
  .rah-skill .ds{ font-size:12.5px; color:var(--muted); line-height:1.55; flex:1;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .rah-start{ display:inline-flex; align-items:center; gap:7px; align-self:flex-start;
    margin-top:15px; padding:9px 15px; border-radius:10px; cursor:pointer;
    font-size:12.5px; font-weight:700; color:#fff; text-decoration:none; letter-spacing:.01em;
    background:linear-gradient(135deg,var(--acc1),var(--acc2));
    box-shadow:0 4px 16px rgba(124,92,255,.4), 0 1px 0 rgba(255,255,255,.2) inset;
    transition:filter .14s ease, transform .12s ease, box-shadow .14s ease; }
  .rah-start:hover{ filter:brightness(1.1); transform:translateY(-1px);
    box-shadow:0 6px 22px rgba(170,80,255,.55), 0 1px 0 rgba(255,255,255,.2) inset; }
  .rah-start:active{ transform:translateY(0); }
  .rah-start svg{ width:11px; height:11px; }
  /* tools */
  .rah-tools{ display:flex; flex-wrap:wrap; gap:9px; max-width:1100px; }
  .rah-tool{ padding:9px 13px; border-radius:10px; font-size:12.5px; color:var(--muted);
    background:rgba(255,255,255,.035); border:1px solid var(--bd); }
  .rah-tool b{ color:#e6e3ff; font-weight:650; font-family:var(--mono); font-size:12px; }
  .rah-empty{ color:var(--faint); font-size:13px; padding:6px 2px; }
  .rah-none{ display:none; color:var(--faint); font:13.5px var(--mono); padding:18px 2px; }
</style>

<div id="rah-status">Loading agents&hellip;</div>
<div id="rah" style="display:none">
  <div class="rah-head">
    <h1>Rockstar Agents</h1>
    <p class="sub">Every agent you can run, with the skills and tools inside it. Pick a skill and start a new chat.</p>
    <span class="rah-count" id="rah-count"></span>
  </div>
  <div class="rah-search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><path d="M21 21l-4-4"></path></svg>
    <input id="rah-q" type="text" placeholder="Search skills&hellip;" autocomplete="off">
  </div>
  <div id="rah-body"></div>
  <div class="rah-none" id="rah-none">No skills match your search.</div>
</div>

<script>
  // Claude replaces __ROCKSTAR_AGENTS_TOOL__ with the EXACT loaded tool name
  // (mcp__<serverId>__rockstar_agents, UUID serverId — NOT mcp__ir-mcp__...).
  const TOOL = "__ROCKSTAR_AGENTS_TOOL__";   // read-only catalog tool
  const ARGS = {};
  const PLAY = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';

  function unwrap(r){
    if(r && r.isError) throw new Error("Tool returned an error");
    if(r && r.structuredContent != null) return r.structuredContent;
    try{ return JSON.parse(r.content[0].text); }
    catch{ return r.content?.[0]?.text ?? {}; }
  }
  function esc(s){
    return String(s ?? "").replace(/[&<>"]/g, c =>
      ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]));
  }
  function attr(s){ return esc(s).replace(/'/g,"&#39;"); }

  function skillCard(s){
    const raw  = s.name || s.skillId || "";
    const name = esc(raw);
    const desc = s.description ? esc(s.description) : "";
    const prompt = "Hey Rockstar, run the " + raw + " skill";
    const link = "claude://cowork/new?q=" + encodeURIComponent(prompt);
    const hay  = (raw + " " + (s.description || "")).toLowerCase();
    return `<div class="rah-skill" data-s="${attr(hay)}">
      <div class="nm">${name}</div>
      <div class="ds">${desc}</div>
      <a class="rah-start" href="${attr(link)}" data-prompt="${attr(prompt)}"
         onclick="startChat(this)">${PLAY} Start chat</a>
    </div>`;
  }
  function toolChip(t){
    const name = esc(t.name || "");
    const desc = t.description ? " &middot; " + esc(t.description) : "";
    return `<div class="rah-tool"><b>${name}</b>${desc}</div>`;
  }
  function agentBlock(a){
    const skills = a.skills || [], tools = a.tools || [];
    const skillsHtml = skills.length
      ? `<div class="rah-grid">${skills.map(skillCard).join("")}</div>`
      : `<div class="rah-empty">No skills in this agent.</div>`;
    const toolsHtml = tools.length
      ? `<div class="rah-label">Tools</div><div class="rah-tools">${tools.map(toolChip).join("")}</div>`
      : "";
    return `<div class="rah-agent">
      <div class="rah-agent-head">
        <h2>${esc(a.displayName || a.name)}</h2>
        <span class="tag">${skills.length} skills &middot; ${tools.length} tools</span>
      </div>
      ${a.description ? `<p class="rah-agent-desc">${esc(a.description)}</p>` : ""}
      <div class="rah-label">Skills</div>
      ${skillsHtml}
      ${toolsHtml}
    </div>`;
  }
  function render(data){
    const agents = (data && data.agents) || [];
    const nSkills = agents.reduce((n,a)=> n + (a.skills?.length||0), 0);
    const nTools  = agents.reduce((n,a)=> n + (a.tools?.length||0), 0);
    document.getElementById("rah-count").innerHTML =
      `${agents.length} agent${agents.length===1?"":"s"} &middot; ${nSkills} skills &middot; ${nTools} tools`;
    document.getElementById("rah-body").innerHTML = agents.length
      ? agents.map(agentBlock).join("")
      : `<div class="rah-empty">No agents available yet.</div>`;
  }
  function startChat(el){
    const prompt = el.getAttribute("data-prompt") || "";
    try{ navigator.clipboard && navigator.clipboard.writeText(prompt); }catch(e){}
    // href fires and opens Claude; clipboard is the fallback if the sandbox blocks it.
  }
  function filter(q){
    q = (q||"").trim().toLowerCase();
    const cards = document.querySelectorAll(".rah-skill");
    let shown = 0;
    cards.forEach(c=>{
      const hit = !q || (c.getAttribute("data-s")||"").includes(q);
      c.style.display = hit ? "" : "none";
      if(hit) shown++;
    });
    document.querySelectorAll(".rah-agent").forEach(ag=>{
      const any = ag.querySelector('.rah-skill:not([style*="display: none"])');
      ag.style.display = (q && !any) ? "none" : "";
    });
    document.getElementById("rah-none").style.display = (q && shown===0) ? "block" : "none";
  }
  async function load(){
    const status = document.getElementById("rah-status");
    try{
      const r = await window.cowork.callMcpTool(TOOL, ARGS);
      render(unwrap(r));
      status.style.display = "none";
      document.getElementById("rah").style.display = "block";
      const q = document.getElementById("rah-q");
      q.addEventListener("input", e => filter(e.target.value));
    }catch(e){
      status.textContent = "Failed to load agents: " + e.message;
    }
  }
  load();
</script>
